basePath: /v1
definitions:
  github_com_b1g-nguyx_strangerchat-backend_pkg_response.APIResponse:
    properties:
      data:
        description: 'omitempty: hidden if nil'
      error_code:
        description: 'omitempty: hidden if 0 (success)'
        type: integer
      message:
        type: string
      time:
        type: string
    type: object
  internal_controller_restapi_client_v1_auth.AuthData:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/internal_controller_restapi_client_v1_auth.UserDTO'
    type: object
  internal_controller_restapi_client_v1_auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  internal_controller_restapi_client_v1_auth.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  internal_controller_restapi_client_v1_auth.UserDTO:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      display_name:
        type: string
      email:
        type: string
      id:
        type: string
      status:
        type: string
      username:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API documentation for StrangerChat Client Backend
  title: StrangerChat Client API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login in system with username password
      parameters:
      - description: Login Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_controller_restapi_client_v1_auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_b1g-nguyx_strangerchat-backend_pkg_response.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/internal_controller_restapi_client_v1_auth.AuthData'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_b1g-nguyx_strangerchat-backend_pkg_response.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_b1g-nguyx_strangerchat-backend_pkg_response.APIResponse'
      summary: Login method
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account with username, email, and password
      parameters:
      - description: Register Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_controller_restapi_client_v1_auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/github_com_b1g-nguyx_strangerchat-backend_pkg_response.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/internal_controller_restapi_client_v1_auth.AuthData'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_b1g-nguyx_strangerchat-backend_pkg_response.APIResponse'
      summary: Register a new user
      tags:
      - Auth
swagger: "2.0"
