basePath: /v1
definitions:
  github_com_b1g-nguyx_strangerchat-backend_internal_common_response.APIResponse:
    properties:
      data:
        description: 'omitempty: hidden if nil'
      error_code:
        description: 'omitempty: hidden if 0 (success)'
        type: integer
      message:
        type: string
      time:
        type: string
    type: object
  internal_features_auth_delivery_http.AdminAuthData:
    properties:
      access_token:
        type: string
      role:
        type: string
    type: object
  internal_features_auth_delivery_http.AdminLoginRequest:
    properties:
      email:
        type: string
      otp:
        description: 'Example: Admin requires 2FA'
        type: string
      password:
        type: string
    required:
    - email
    - otp
    - password
    type: object
  internal_features_auth_delivery_http.AuthData:
    properties:
      access_token:
        type: string
      user:
        $ref: '#/definitions/internal_features_auth_delivery_http.UserDTO'
    type: object
  internal_features_auth_delivery_http.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  internal_features_auth_delivery_http.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  internal_features_auth_delivery_http.UserDTO:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      display_name:
        type: string
      email:
        type: string
      id:
        type: string
      status:
        type: string
      username:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API documentation for StrangerChat Client Backend
  title: StrangerChat Client API
  version: "1.0"
paths:
  /admin/auth/login:
    post:
      consumes:
      - application/json
      description: Login to admin dashboard (requires admin role)
      parameters:
      - description: Admin Login Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_auth_delivery_http.AdminLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_b1g-nguyx_strangerchat-backend_internal_common_response.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/internal_features_auth_delivery_http.AdminAuthData'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_b1g-nguyx_strangerchat-backend_internal_common_response.APIResponse'
      summary: Admin Login method
      tags:
      - Admin Auth
  /admin/users:
    get:
      consumes:
      - application/json
      description: Get users with filtering (Admin only)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_b1g-nguyx_strangerchat-backend_internal_common_response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_b1g-nguyx_strangerchat-backend_internal_common_response.APIResponse'
      summary: Get list of users
      tags:
      - Admin User
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login in system with username password
      parameters:
      - description: Login Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_auth_delivery_http.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_b1g-nguyx_strangerchat-backend_internal_common_response.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/internal_features_auth_delivery_http.AuthData'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_b1g-nguyx_strangerchat-backend_internal_common_response.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_b1g-nguyx_strangerchat-backend_internal_common_response.APIResponse'
      summary: Login method
      tags:
      - Auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Logout user and clear refresh token cookie
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_b1g-nguyx_strangerchat-backend_internal_common_response.APIResponse'
      summary: Logout
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Get a new access token using a valid refresh token
      parameters:
      - description: refresh_token cookie
        in: header
        name: Cookie
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_b1g-nguyx_strangerchat-backend_internal_common_response.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/internal_features_auth_delivery_http.AuthData'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_b1g-nguyx_strangerchat-backend_internal_common_response.APIResponse'
      summary: Refresh token
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account with username, email, and password
      parameters:
      - description: Register Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_auth_delivery_http.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/github_com_b1g-nguyx_strangerchat-backend_internal_common_response.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/internal_features_auth_delivery_http.AuthData'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_b1g-nguyx_strangerchat-backend_internal_common_response.APIResponse'
      summary: Register a new user
      tags:
      - Auth
swagger: "2.0"
